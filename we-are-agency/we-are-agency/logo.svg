  <!-- Bulb Outline -->
  <path d="M100 30 C60 30 40 55 40 85 C40 105 52 120 65 135 L65 155 C65 160 68 165 75 165 L125 165 C132 165 135 160 135 155 L135 135 C148 120 160 105 160 85 C160 55 140 30 100 30 Z" fill="none" stroke="#FFD700" stroke-width="8"/>
  
  <!-- Bulb inner grid/globe -->
