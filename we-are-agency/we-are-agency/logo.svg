  <path d="M100 40 C80 40 70 60 70 85 C70 110 80 130 100 130 C120 130 130 110 130 85 C130 60 120 40 100 40 Z" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
  <path d="M55 85 L145 85" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
  <path d="M100 40 L100 130" stroke="#FFD700" stroke-width="2" opacity="0.8"/>

